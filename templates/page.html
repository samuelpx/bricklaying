{% extends "base.html" %}

{% block title %}{{ page.title }} &mdash; {{ config.title }}{% endblock title %}

{% block content %}

<a href="{{ get_url(path='posts') }}" class="back-link">back to posts</a>

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date(format="%Y-%m-%d") }}</div>
  </header>
  <div class="post-content">
    {{ page.content | safe }}
  </div>
</article>

{% endblock content %}
