{% extends "base.html" %}

{% block title %}Posts &mdash; {{ config.title }}{% endblock title %}

{% block content %}

<h2 class="section-title">ALL POSTS</h2>

<ul class="post-list">
  {% for page in section.pages %}
  <li class="post-item">
    <a href="{{ page.permalink }}">{{ page.title }}</a>
    <div class="post-date">{{ page.date | date(format="%Y-%m-%d") }}</div>
  </li>
  {% endfor %}
</ul>

{% endblock content %}
