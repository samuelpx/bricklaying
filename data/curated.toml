# Each item needs a `type` field. Available types:
#
# type = "link"
#   title   = "Display text for the link"         (required)
#   url     = "https://..."                        (required)
#   note    = "Short description below the link"  (optional)
#   span    = true                                 (optional — makes card twice as wide)
#
# type = "quote"
#   text       = "The quote itself"                (required)
#   credit     = "Author or source name"           (optional)
#   credit_url = "https://..."                     (optional — makes credit a link)
#   span       = true                              (optional)
#
# type = "image"
#   src     = "/images/filename.jpg"               (required — put files in static/images/)
#   alt     = "Description for accessibility"      (required)
#   caption = "Text shown below the image"         (optional)
#   span    = true                                 (optional)
#
# type = "text"
#   text    = "A standalone paragraph or note"     (required)
#   span    = true                                 (optional)

[[items]]
type  = "link"
