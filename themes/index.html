<script>
  document.addEventListener('click', function(e) {
    var el = e.target.closest('.sc-cycle');
    if (!el) return;
    var words = JSON.parse(el.dataset.words);
    var current = parseInt(el.dataset.index);
    var next;
    if (el.dataset.random === 'true') {
      var windowSize = Math.floor(words.length / 2);
      var history = el.dataset.history ? JSON.parse(el.dataset.history) : [current];
      var excluded = history.slice(-windowSize);
      var available = [];
      for (var i = 0; i < words.length; i++) {
        if (excluded.indexOf(i) === -1) available.push(i);
      }
      next = available[Math.floor(Math.random() * available.length)];
      history.push(next);
      if (history.length > windowSize) history = history.slice(-windowSize);
      el.dataset.history = JSON.stringify(history);
    } else {
      next = (current + 1) % words.length;
    }
    el.dataset.index = next;
    el.textContent = words[next];
  });
</script>

<script>
  (function() {
    var audio = document.getElementById('bg-audio');
    if (!audio.querySelector('source')) return;

    audio.play().catch(function() {
      function tryPlay() {
        audio.play().catch(function() {});
        document.removeEventListener('click', tryPlay);
        document.removeEventListener('keydown', tryPlay);
      }
      document.addEventListener('click', tryPlay);
      document.addEventListener('keydown', tryPlay);
    });
  })();
</script>
